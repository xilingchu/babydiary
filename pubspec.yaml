name: baby_diary
description: "Baby diary app for recording growth memories."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local SQLite database (supports Linux, Android, Web)
  drift: ^2.22.1
  drift_flutter: ^0.2.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # PocketBase LAN sync
  pocketbase: ^0.24.0

  # Image and video handling
  image_picker: ^1.1.2
  video_compress: ^3.1.4
  video_player: ^2.9.2

  # Navigation
  go_router: ^14.6.2

  # Utilities
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.1
  shared_preferences: ^2.3.3

  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^22.0.0
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  # Code generation for Drift and Riverpod
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: assets/icon.png
  linux:
    generate: true
    image_path: assets/icon.png
  image_path: assets/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
